<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حجز العيادات الطبية - SPS</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-50 font-sans text-gray-800">

    <header class="bg-teal-600 text-white shadow-md p-4">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold">بوابة حجز العيادات الذكية</h1>
            <a href="#" class="text-sm underline hover:text-gray-200">العودة للمتجر</a>
        </div>
    </header>

    <main class="container mx-auto my-8 px-4 max-w-4xl">
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 space-y-6">
            
            <!-- اختيار التخصص -->
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2">اختر التخصص الطبي:</label>
                <select class="w-full border border-gray-300 rounded-xl p-3 bg-white focus:ring-2 focus:ring-teal-500 text-sm">
                    <option>أمراض القلب والأوعية الدموية (Cardiology)</option>
                    <option>طب الأطفال (Pediatrics)</option>
                    <option>الباطنة العامة (Internal Medicine)</option>
                </select>
            </div>

            <hr class="border-gray-100">

            <!-- كارت بيانات الدكتور المحجوز عنده -->
            <div class="bg-teal-50/50 p-4 rounded-xl border border-teal-100/50 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                <div>
                    <h3 class="font-bold text-lg text-gray-900">د. أحمد علي</h3>
                    <p class="text-xs text-gray-500 mt-1">مستشفى الأمل التخصصي</p>
                    <p class="text-sm text-teal-700 font-semibold mt-2">رسوم الكشف: $20.00</p>
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 mb-1">اختر تاريخ الزيارة:</label>
                    <input type="date" value="2026-07-15" class="border border-gray-300 rounded-lg p-2 text-sm bg-white">
                </div>
            </div>

            <!-- الفترات الزمنية المتاحة (Time Slots) -->
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-3">الفترات الزمنية المتاحة ليوم الحجز:</label>
                <div class="grid grid-cols-2 md:grid-cols-3 gap-3">
                    
                    <!-- فترة متاحة -->
                    <label class="border border-gray-200 rounded-xl p-3 flex items-center justify-between cursor-pointer hover:border-teal-500 transition">
                        <span class="text-sm font-medium text-gray-700">05:00 م - 05:30 م</span>
                        <input type="radio" name="time_slot" class="text-teal-600 focus:ring-teal-500">
                    </label>

                    <!-- فترة محجوزة مسبقاً ومغلقة -->
                    <label class="border border-gray-200 bg-gray-100 opacity-50 rounded-xl p-3 flex items-center justify-between cursor-not-allowed">
                        <span class="text-sm font-medium text-gray-400 line-through">05:30 م - 06:00 م</span>
                        <span class="text-xs text-red-600 font-bold bg-white px-1.5 py-0.5 rounded shadow-xs">محجوز</span>
                    </label>

                    <!-- فترة متاحة -->
                    <label class="border border-gray-200 rounded-xl p-3 flex items-center justify-between cursor-pointer hover:border-teal-500 transition">
                        <span class="text-sm font-medium text-gray-700">06:00 م - 06:30 م</span>
                        <input type="radio" name="time_slot" class="text-teal-600 focus:ring-teal-500">
                    </label>

                </div>
            </div>

            <!-- زر تأكيد الحجز -->
            <div class="pt-4">
                <button class="w-full bg-teal-600 hover:bg-teal-700 text-white font-bold py-3.5 px-4 rounded-xl shadow-md hover:shadow-lg transition text-center">
                    تأكيد الحجز الفوري
                </button>
            </div>

        </div>
    </main>

</body>
</html>
